version: '3.8'

services:
  # MongoDB Service
  mongo:
    image: mongo:latest
    container_name: gym-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  # Backend Service
  backend:
    build: ./server
    container_name: gym-backend
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://mongo:27017/gymDB
      - JWT_SECRET=supersecretgymkey
    depends_on:
      - mongo

  # Frontend Service
  frontend:
    build: ./client
    container_name: gym-frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  mongo-data:
