services:
  # Backend Service
  - type: web
    name: gym-backend
    runtime: docker
    dockerContext: ./server
    dockerfilePath: Dockerfile
    plan: free
    envVars:
      - key: PORT
        value: 5000
      - key: MONGO_URI
        sync: false # User must provide their MongoDB Atlas URI in the Render Dashboard
      - key: JWT_SECRET
        generateValue: true

  # Frontend Service
  - type: web
    name: gym-frontend
    runtime: docker
    dockerContext: ./client
    dockerfilePath: Dockerfile
    plan: free
    envVars:
      - key: VITE_API_URL
        sync: false # User must provide the public URL of the backend here (e.g., https://gym-backend.onrender.com)
